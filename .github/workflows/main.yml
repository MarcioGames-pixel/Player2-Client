name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      GODOT_VERSION: 3.6-stable
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk

    steps:

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            wget \
            unzip \
            zip \
            openjdk-17-jdk \
            xvfb

      - name: Clonar Player2
        run: |
          git clone https://github.com/Ezcha/player2-client.git project

      - name: Baixar Godot 3.6
        run: |
          wget -O godot.zip \
          https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_linux_headless.64.zip

          unzip godot.zip
          chmod +x Godot_v3.6-stable_linux_headless.64

      - name: Instalar Export Templates
        run: |
          wget -O templates.tpz \
          https://github.com/godotengine/godot/releases/download/3.6-stable/Godot_v3.6-stable_export_templates.tpz

          mkdir -p ~/.local/share/godot/templates/3.6.stable

          unzip -o templates.tpz -d templates_temp

          cp -r templates_temp/templates/* \
          ~/.local/share/godot/templates/3.6.stable

          find ~/.local/share/godot/templates -type f

      - name: Instalar Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          wget -O sdk.zip \
          https://dl.google.com/android/repository/commandlinetools-linux-13114758_latest.zip

          unzip sdk.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest

          mv cmdline-tools/* \
          $ANDROID_SDK_ROOT/cmdline-tools/latest/

      - name: Instalar ferramentas Android
        run: |
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          yes | sdkmanager --licenses || true

          sdkmanager \
          "platform-tools" \
          "platforms;android-31" \
          "build-tools;31.0.0"

      - name: Criar Keystore
        run: |
          keytool \
          -genkeypair \
          -alias androiddebugkey \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -dname "CN=Android Debug,O=Android,C=US"

      - name: Copiar Keystore
        run: |
          cp debug.keystore project/

      - name: Verificar projeto
        working-directory: project
        run: |
          ls -la
          test -f project.godot

          echo "Arquivos nativos:"
          find native -type f || true

      - name: Criar export_presets.cfg
        working-directory: project
        run: |
          printf '%s\n' \
          '[preset.0]' \
          '' \
          'name="Android"' \
          'platform="Android"' \
          'runnable=true' \
          'export_filter="all_resources"' \
          'export_path="Player2.apk"' \
          '' \
          '[preset.0.options]' \
          '' \
          'keystore/debug="res://debug.keystore"' \
          'keystore/debug_user="androiddebugkey"' \
          'keystore/debug_password="android"' \
          'package/name="Player2"' \
          'package/unique_name="com.player2.client"' \
          'permissions/internet=true' \
          > export_presets.cfg

      - name: Exportar APK
        working-directory: project
        run: |
          export PATH=$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/31.0.0:$PATH

          xvfb-run -a \
          ../Godot_v3.6-stable_linux_headless.64 \
          --headless \
          --verbose \
          --path . \
          --export-debug "Android" Player2.apk

      - name: Verificar APK
        run: |
          ls -lh project/Player2.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Player2-0.0.1
          path: project/Player2.apk
